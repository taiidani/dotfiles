# espanso match file

# For a complete introduction, visit the official docs at: https://espanso.org/docs/

# You can use this file to define the base matches (aka snippets)
# that will be available in every application when using espanso.

# Matches are substitution rules: when you type the "trigger" string
# it gets replaced by the "replace" string.
matches:
  # Simple text replacement
  - trigger: "/ticket"
    label: Epic
    replace: |
      ## Background

      * Why is this Epic important?
      * What problem or opportunity does it address?
      * How does it build on previous work or initiatives?

      ## Summary

      * What are the main goals of this Epic?
      * What key outcomes are expected?
      * What are the major activities or deliverables?

      ## Stakeholders

      * Who are the key stakeholders involved?
      * What roles do these stakeholders play?

      ## Target Goals

      * What specific, measurable goals do we want to achieve?
      * How will success be measured?
      * What are the timeframes for achieving these goals?

      ## PRD/RFC

      PRD required? Yes/No

      RFC required? Yes/No

  - trigger: "/ticket"
    label: Task
    replace: |
      ## Background

      * Why is this Task important?
      * Is this Task part of a larger sequence of changes?
      * What current state in behavior or functionality is this proposing to change?

      ## Summary

      * What are the main goals of this Task?
      * What are the major changes that will need to take place to fulfill this Task?
      * What behavior or functionality is being changed?

      ## Acceptance Criteria

      * What will the behavior or functionality look like upon completion?
      * What specific, measurable goals do we want to achieve?
      * How will success be measured?

  - trigger: "/ticket"
    label: Bug
    replace: |
      ## Background

      * Did any known changes introduce this bug?
      * Was this bug reported as part of a conversation or external discussion?

      ## Summary

      * What is the bug? Describe clearly and concisely.

      ### Expected Behavior

      * What was supposed to happen?

      ### Actual Behavior

      * What happened instead?
      * Is there additional context to help understand the behavior?

      ## Reproduction Steps

      * What steps can the assignee take to reproduce the behavior?

  - trigger: "/ticket"
    label: Idea
    replace: |
      ## What

      <Describe what you are proposing>

      ## Why

      <Explain why this is important for the upcoming quarter>

  - trigger: ":daily"
    markdown: |
      :broom-spin: :broom-spin: :broom-spin:

      [Ticket](https://hashicorp.atlassian.net/browse/)

      Triage instructions: https://go.hashi.co/dw-triage

      Recommended discussion points:
      * Is there enough information in the ticket/Is the ticket workable?
      * Are the guidelines in What's In A Ticket being followed?
      * Are necessary documentation updates included in the scope?
      * Does this work align with our current priorities/our team charter?
      * What is the potential impact of doing/not doing this work?

      :broom-spin: :broom-spin: :broom-spin:

    # ":broom: JIRA ([Guide](https://hashicorp.atlassian.net/wiki/spaces/TDP/pages/2728132676/Ticket+Scoring)) :broom:"

  - trigger: "/review"
    label: "Review Question 🙋"
    replace: "Question 🙋 - "
  - trigger: "/review"
    label: "Review Thought 💭"
    replace: "Thought 💭 - "
  - trigger: "/review"
    label: "Review Optional 🎨"
    replace: "Optional 🎨 - "
  - trigger: "/review"
    label: "Review Blocker 🚧"
    replace: "Blocker 🚧 - "
  - trigger: "/review"
    label: "Review Future 📌"
    replace: "Future 📌 - "
  - trigger: "/review"
    label: "Review Nitpick ⛏️"
    replace: "Nitpick ⛏️ - "
  - trigger: "/review"
    label: "Review Praise 🙌"
    replace: "Praise 🙌 - "

  - trigger: "/callout"
    label: "⚠️ GitHub Warning"
    replace: |
      > [!WARNING]
      >
  - trigger: "/callout"
    label: "ℹ️ GitHub Note"
    replace: |
      > [!NOTE]
      >
  - trigger: "/callout"
    label: "✅ GitHub Success"
    replace: |
      > [!SUCCESS]
      >
  - trigger: "/callout"
    label: "⚠️ Backstage Warning"
    replace: "!!!warning\n\n    "
  - trigger: "/callout"
    label: "ℹ️ Backstage Note"
    replace: "!!!note\n\n    "
  - trigger: "/callout"
    label: "✅ Backstage Success"
    replace: "!!!success\n\n    "

  - trigger: "/pull"
    replace: |
      ## What and How 🛠️

      <!--
      List out the changes proposed in this PR.
      Dive into the approach you took, list resources you referenced, detail other approaches you tried but didn't end up going with, etc.
      -->

      ## Why 🤷

      <!--
      Describe why the changes proposed are needed. Some examples: new feature requested, refactor to make things easier later, bug fix, etc.
      Include a link to the JIRA ticket, and any other links that might make it easier to understand the reason for your PR.
      -->

      - [Ticket](https://hashicorp.atlassian.net/browse/xxxx) 🎟️

      ## Testing 🧪

      <!--
      Create a checklist for going through how to test your proposed changes. If there is anything to configure before interacting with the project, such as changing machine settings, list those steps first.

      - Step 1
      - Step 2
      - Step 3
      - ...
      -->

      ## Anything else? 💭

      <!--
      List any post-merge steps, rollback plans, or other information that might be useful for reviewers to know.
      If you came across something that you chose not to address in this PR but plan to soon, list those items here and any JIRA tasks you created to go with them.
      -->

  - trigger: ":heads_down:"
    replace: ":heads-down:"
  - trigger: "benig"
    replace: "being"
  - trigger: "committment"
    replace: "commitment"
  - trigger: "dicker"
    replace: "docker"
    word: true
    propagate_case: true
  - trigger: "Hashicorp"
    replace: "HashiCorp"
  - trigger: "JIRA"
    replace: "Jira"
  - trigger: "mkdics"
    replace: "mkdocs"
  - trigger: "playright"
    replace: "playwright"
    propagate_case: true
