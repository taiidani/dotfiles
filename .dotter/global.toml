[helpers]

[default]
depends = []

[default.files]
".claude/skills/obsidian" = "~/.claude/skills/obsidian"
".claude/skills/go" = "~/.claude/skills/go"
"mise.toml" = "~/.config/mise/config.toml"
gitconfig = "~/.gitconfig"
".config/git/excludes" = "~/.config/git/excludes"

[default.variables]
email = "r.taiidani@gmail.com"
zsh_addons_path = "/usr/share/zsh/plugins"

[home]
depends = ["default"]

[home.files]
".claude/skills/dependabot-merger" = "~/.claude/skills/dependabot-merger"
".claude/settings.local.json" = "~/.claude/settings.local.json"
zshrc = "~/.zshrc"

[work]
depends = ["default"]

[work.files]
".claude/skills/coder" = "~/.claude/skills/coder"
".claude/skills/daily-routine" = "~/.claude/skills/daily-routine"
".claude/skills/jira" = "~/.claude/skills/jira"
".claude/skills/mail" = "~/.claude/skills/mail"
".claude/skills/slack" = "~/.claude/skills/slack"
".ssh/config" = "~/.ssh/config"
"mise.work.toml" = "~/.mise.toml"
"zshrc.work.zsh" = "~/.zshrc"

[crc]
depends = ["work"]

[crc.files]
".crc/crc.json" = "~/.crc/crc.json"
".testcontainers.properties" = { target = "~/.testcontainers.properties", type = "symbolic" }

[settings]
default_target_type = "automatic"
