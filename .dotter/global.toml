[helpers]

[default]
depends = []

[default.files]
".config/git/excludes" = "~/.config/git/excludes"
".config/opencode/opencode.json" = "~/.config/opencode/opencode.json"
".opencode/commands" = "~/.opencode/commands"
".opencode/agents" = "~/.opencode/agents"
".opencode/skills/gh-cli" = "~/.opencode/skills/gh-cli"
".opencode/skills/go" = "~/.opencode/skills/go"
".opencode/skills/mise" = "~/.opencode/skills/mise"
".opencode/skills/obsidian" = "~/.opencode/skills/obsidian"
"mise.toml" = "~/.config/mise/config.toml"
gitconfig = "~/.gitconfig"

[default.variables]
email = "r.taiidani@gmail.com"
zsh_addons_path = "/usr/share/zsh/plugins"

[home]
depends = ["default"]

[home.files]
".claude/settings.local.json" = "~/.claude/settings.local.json"
".opencode/skills/dependabot-merger" = "~/.opencode/skills/dependabot-merger"
zshrc = "~/.zshrc"

[linux.files]
".config/ghostty/config" = "~/.config/ghostty/config"
".ssh/config" = "~/.ssh/config"

[macos.files]
# Tuna does not support symlinked scripts
# "Library/Application Support/Tuna/config.toml" = { target = "~/Library/Application Support/Tuna/config.toml", type = "symbolic" }
"Library/Scripts" = { target = "~/Library/Scripts", type = "template" }

[crc]

[crc.files]
".crc/crc.json" = "~/.crc/crc.json"
".testcontainers.properties" = { target = "~/.testcontainers.properties", type = "symbolic" }

[settings]
default_target_type = "automatic"
